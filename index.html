<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DompetKu Pro - Full Refactor</title><script src="https://cdn.tailwindcss.com"></script><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>

body {
    font-family: system-ui, -apple-system, sans-serif;
}

#splash {
    position: fixed;
    inset: 0;
    background: linear-gradient(270deg,#0f172a,#1e293b,#020617);
    background-size: 600% 600%;
    animation: gradientMove 15s ease infinite;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    color: white;
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.tab { display: none; }
.tab.active { display: block; }

.nav-btn.active {
    color: #2563eb;
    font-weight: bold;
}

.fab {
    position: fixed;
    bottom: 80px;
    right: 20px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg,#2563eb,#4f46e5);
    color: white;
    font-size: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

</style></head><body class="bg-gray-100 min-h-screen"><!-- SPLASH --><div id="splash"><img src="dompetku.png" style="width:120px;margin-bottom:20px;"><h1 class="text-2xl font-bold mb-2">
DompetKu
</h1><p class="opacity-70 mb-4">
Memuat aplikasi...
</h1><p class="opacity-70 mb-4">By @ToroDev</p>
</p></div><!-- MAIN APP --><div id="mainApp" class="pb-24" style="display:none;"><!-- TOP BAR --><div class="bg-white shadow-sm sticky top-0 z-40"><div class="flex items-center justify-between px-4 py-3"><h1 class="font-semibold text-lg">
💰 DompetKu
</h1><button onclick="resetData()" class="text-sm text-red-500">
Reset
</button></div></div><div class="max-w-md mx-auto p-4"><!-- DASHBOARD --><div id="dashboardTab" class="tab active space-y-4"><div class="bg-white rounded-2xl shadow p-4">
<p class="text-gray-500 text-sm">Saldo</p>
<p id="saldo" class="text-2xl font-bold">Rp 0</p>
</div><div class="grid grid-cols-2 gap-3"><div class="bg-white rounded-2xl shadow p-4">
<p class="text-gray-500 text-sm">Pemasukan</p>
<p id="pemasukan" class="text-xl font-bold text-green-600">Rp 0</p>
</div><div class="bg-white rounded-2xl shadow p-4">
<p class="text-gray-500 text-sm">Pengeluaran</p>
<p id="pengeluaran" class="text-xl font-bold text-red-600">Rp 0</p>
</div></div></div><!-- TRANSAKSI --><div id="transaksiTab" class="tab space-y-4"><div class="bg-white rounded-2xl shadow p-4 space-y-3"><h2 class="font-semibold text-lg">
Tambah / Edit Transaksi
</h2><input id="nama" type="text" placeholder="Nama transaksi" class="w-full p-3 border rounded-xl"><input id="jumlah" type="number" placeholder="Jumlah uang" class="w-full p-3 border rounded-xl"><select id="jenis" class="w-full p-3 border rounded-xl">
<option value="pemasukan">Pemasukan</option>
<option value="pengeluaran">Pengeluaran</option>
</select><button onclick="simpanTransaksi()" class="w-full p-3 rounded-xl text-white font-semibold bg-gradient-to-r from-blue-600 to-indigo-600">
💾 Simpan Transaksi
</button></div><ul id="riwayat" class="space-y-2"></ul></div><!-- TARGET --><div id="targetTab" class="tab space-y-4"><div class="bg-white rounded-2xl shadow p-4 space-y-3"><h2 class="font-semibold text-lg">🎯 Target Tabungan</h2><input id="targetNama" type="text" placeholder="Nama target" class="w-full p-3 border rounded-xl"><input id="targetJumlah" type="number" placeholder="Jumlah target" class="w-full p-3 border rounded-xl"><button onclick="tambahTarget()" class="w-full p-3 rounded-xl bg-purple-600 text-white">
Tambah Target
</button><div id="targetList"></div></div></div><!-- GRAFIK --><div id="grafikTab" class="tab"><div class="bg-white rounded-2xl shadow p-4"><h2 class="font-semibold mb-3">Grafik Keuangan</h2><canvas id="chart"></canvas>

</div></div><!-- BACKUP --><div id="backupTab" class="tab space-y-3"><div class="bg-white rounded-2xl shadow p-4"><button onclick="backupData()" class="w-full p-3 bg-green-600 text-white rounded-xl mb-2">
Backup Data
</button><input id="restoreFile" type="file" class="w-full mb-2"><button onclick="restoreData()" class="w-full p-3 bg-orange-600 text-white rounded-xl">
Restore Data
</button></div></div></div><!-- FLOATING BUTTON --><button class="fab" onclick="switchTab('transaksiTab', document.querySelectorAll('.nav-btn')[1])">
+
</button><!-- NAVIGATION --><div class="fixed bottom-0 left-0 right-0 bg-white border-t shadow flex justify-around py-2"><button onclick="switchTab('dashboardTab', this)" class="nav-btn active flex flex-col items-center">
🏠
<span class="text-xs">Dashboard</span>
</button><button onclick="switchTab('transaksiTab', this)" class="nav-btn flex flex-col items-center">
📋
<span class="text-xs">Transaksi</span>
</button><button onclick="switchTab('targetTab', this)" class="nav-btn flex flex-col items-center">
🎯
<span class="text-xs">Target</span>
</button><button onclick="switchTab('grafikTab', this)" class="nav-btn flex flex-col items-center">
📊
<span class="text-xs">Grafik</span>
</button><button onclick="switchTab('backupTab', this)" class="nav-btn flex flex-col items-center">
☁️
<span class="text-xs">Backup</span>
</button></div></div><script>

/* SPLASH */

setTimeout(() => {

const splash = document.getElementById("splash");

splash.style.display = "none";

document.getElementById("mainApp").style.display = "block";

render();

}, 2500);

/* NAVIGATION */

function switchTab(tabId, el) {

const tabs = document.querySelectorAll(".tab");

tabs.forEach(tab => tab.classList.remove("active"));

document.getElementById(tabId).classList.add("active");

const buttons = document.querySelectorAll(".nav-btn");

buttons.forEach(btn => btn.classList.remove("active"));

if (el) el.classList.add("active");

}

/* DATA */

let transaksi = JSON.parse(localStorage.getItem("transaksi")) || [];

let targets = JSON.parse(localStorage.getItem("targets")) || [];

let chart;

function formatRupiah(angka) {
return "Rp " + angka.toLocaleString("id-ID");
}

/* TRANSAKSI */

function simpanTransaksi() {

const nama = document.getElementById("nama").value;

const jumlah = Number(document.getElementById("jumlah").value);

const jenis = document.getElementById("jenis").value;

if (!nama || !jumlah) {
alert("Isi data dulu");
return;
}

transaksi.push({

nama,

jumlah,

jenis,

tanggal: new Date().toLocaleDateString()

});

localStorage.setItem("transaksi", JSON.stringify(transaksi));

render();

}

function hapusTransaksi(index) {

if (confirm("Hapus transaksi ini?")) {

transaksi.splice(index, 1);

localStorage.setItem("transaksi", JSON.stringify(transaksi));

render();

}

}

function render() {

let pemasukan = 0;
let pengeluaran = 0;

const list = document.getElementById("riwayat");

if (list) list.innerHTML = "";

if (transaksi.length === 0 && list) {

list.innerHTML = `

<div class="text-center text-gray-500 mt-6">
Belum ada transaksi
</div>

`;

}

transaksi.forEach((t, i) => {

if (t.jenis === "pemasukan") pemasukan += t.jumlah;
else pengeluaran += t.jumlah;

if (list) {

const li = document.createElement("li");

li.className = "p-3 border rounded-xl flex justify-between items-center bg-white";

li.innerHTML = `

<div>
<strong>${t.nama}</strong>
<br>
<small>${t.tanggal}</small>
</div>

<div class="flex items-center gap-2">

<span class="font-semibold">
${formatRupiah(t.jumlah)}
</span>

<button onclick="hapusTransaksi(${i})" class="bg-red-500 text-white px-2 py-1 rounded-lg text-sm">
Hapus
</button>

</div>

`;

list.appendChild(li);

}

});

const saldo = pemasukan - pengeluaran;

const s = document.getElementById("saldo");
if (s) s.innerText = formatRupiah(saldo);

const p = document.getElementById("pemasukan");
if (p) p.innerText = formatRupiah(pemasukan);

const pg = document.getElementById("pengeluaran");
if (pg) pg.innerText = formatRupiah(pengeluaran);

updateChart(pemasukan, pengeluaran);

renderTargets();

}

/* CHART */

function updateChart(pemasukan, pengeluaran) {

const ctx = document.getElementById("chart");

if (!ctx) return;

if (chart) chart.destroy();

chart = new Chart(ctx, {

type: "bar",

data: {

labels: ["Pemasukan", "Pengeluaran"],

datasets: [{
label: "Jumlah",

data: [pemasukan, pengeluaran]
}]

}

});

}

/* TARGET */

function tambahTarget() {

const nama = document.getElementById("targetNama").value;

const target = Number(document.getElementById("targetJumlah").value);

if (!nama || !target) {
alert("Isi target dulu");
return;
}

const data = { nama, target };

targets.push(data);

localStorage.setItem("targets", JSON.stringify(targets));

renderTargets();

}

function renderTargets() {

const container = document.getElementById("targetList");

if (!container) return;

container.innerHTML = "";

targets.forEach((t) => {

const div = document.createElement("div");

div.className = "border p-3 rounded-xl mb-2 bg-white";


div.innerHTML = `

<strong>${t.nama}</strong>
<br>
Target: ${formatRupiah(t.target)}

`;

container.appendChild(div);

});

}

/* BACKUP */

function backupData() {

const data = { transaksi, targets };

const json = JSON.stringify(data, null, 2);

const blob = new Blob([json], { type: "application/json" });

const url = URL.createObjectURL(blob);

const a = document.createElement("a");

a.href = url;

a.download = "finance_backup.json";

a.click();

}

function restoreData() {

const file = document.getElementById("restoreFile").files[0];

if (!file) {
alert("Pilih file dulu");
return;
}

const reader = new FileReader();

reader.onload = function(e) {

const data = JSON.parse(e.target.result);

transaksi = data.transaksi || [];

targets = data.targets || [];

localStorage.setItem("transaksi", JSON.stringify(transaksi));
localStorage.setItem("targets", JSON.stringify(targets));

render();

alert("Data berhasil direstore");

};

reader.readAsText(file);

}

/* RESET */

function resetData() {

if (confirm("Hapus semua data?")) {

localStorage.clear();

transaksi = [];

targets = [];

render();

}

}

</script></body>
</html>
